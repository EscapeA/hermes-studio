<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Studio — 离线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f7f4;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      padding: 48px 32px;
      border: 1px solid #e0e0d8;
      border-radius: 16px;
      background: #fff;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    button {
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
      .card { background: #2a2a2a; border-color: #3a3a3a; }
      p { color: #999; }
      button { background: #f0f0f0; color: #1a1a1a; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>无法连接</h1>
    <p>网络不可用或服务器无法访问。<br />请检查网络连接后重试。</p>
    <button onclick="window.location.reload()">重新加载</button>
  </div>
</body>
</html>
