name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - base

permissions:
  contents: read

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild node-pty

      - name: Check repository harness
        run: npm run harness:check

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: hermes-studio-client-dist
          path: dist/client/

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: hermes-studio-client-dist
          path: dist/client/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/client --project-name=hermes-studio --branch=main
